<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>買い物バブル</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1d24" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="買い物バブル" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- 物理バブルの描画領域 -->
    <div id="bubble-stage"></div>

    <!-- 空のときの案内 -->
    <div id="empty-hint" class="hidden">
      <p>まだ何もないよ</p>
      <p class="sub">下から追加してね</p>
    </div>

    <!-- 最近買ったもの ボタン -->
    <button id="recent-btn" title="最近買ったもの">🛍</button>

    <!-- 緊急度ポップオーバー（＋押下後に出る）-->
    <div id="urgency-pop" class="hidden">
      <p class="pop-name" id="pop-name"></p>
      <div class="pop-row">
        <button type="button" class="urgency-opt" data-urgency="anytime">いつか</button>
        <button type="button" class="urgency-opt" data-urgency="soon">そろそろ</button>
        <button type="button" class="urgency-opt" data-urgency="hurry">いそぎ</button>
      </div>
    </div>

    <!-- 入力バー -->
    <form id="add-form">
      <input
        type="text"
        id="item-input"
        placeholder="ほしいもの…"
        autocomplete="off"
        required
      />
      <button type="submit" id="add-btn">＋</button>
    </form>
  </div>

  <!-- 最近買ったもの パネル -->
  <div id="recent-panel" class="hidden">
    <div class="panel-overlay"></div>
    <div class="panel-content">
      <h3>最近買ったもの</h3>
      <ul id="recent-list"></ul>
      <button id="recent-close">閉じる</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
